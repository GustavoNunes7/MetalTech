<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetalTech - Login</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <div id="tela-login">
      <div class="login-box">

        <!-- LADO ESQUERDO -->
        <div class="new-login">

          <div class="login-logo">
            <img
              src="./images/Logo MetalTech 4.svg"
              alt="Metal Tech"
              width="275px"
            />
          </div>

          <div class="text-novoLogin">
            <h2
              id="TextNovoID"
              style="text-decoration: underline; display: inline; color: black"
            >
              Fazer
            </h2>

            <h2 id="TextLoginID" style="display: inline; color: black">
              Login
            </h2>
          </div>

          <p
            style="
              margin-top: 15px;
              color: #444;
              font-size: 15px;
              text-align: center;
              line-height: 22px;
            "
          >
            A tecnologia move o futuro, mas é a inovação que transforma o
            presente.
          </p>

          <a href="index.html">
            <button
              class="btn btn-newLogin"
              id="btn-Criarlogin"
              style="
                padding: 10px;
                margin-top: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
              "
            >
              ← Voltar para tela inicial
            </button>
          </a>

        </div>

        <!-- FORM -->
        <div class="login">

          <section id="pg-login">

            <div class="login-logo">
              <h1 id="idLogin-logo">CRIAR CONTA</h1>
            </div>

            <div
              class="login-erro"
              id="login-erro"
              style="display: none"
            ></div>

            <div class="loginIpt-btn">

              <!-- NOME -->
              <div class="fr2">

                <div class="fg">
                  <label>Nome *</label>

                  <div class="input-icon2">
                    <input
                      id="l-name"
                      type="text"
                      placeholder="Nome Completo"
                    />
                  </div>
                </div>

                <!-- TELEFONE -->
                <div class="fg">
                  <label>Telefone *</label>

                  <div class="input-icon2">
                    <input
                      id="l-telefone"
                      type="text"
                      placeholder="(11) 99999-9999"
                      maxlength="15"
                    />
                  </div>
                </div>

              </div>

              <!-- RUA -->
              <div class="fr2">

                <div class="fg">
                  <label>Rua</label>

                  <div class="input-icon2">
                    <input
                      id="c-rua"
                      type="text"
                      placeholder="Rua das Flores"
                    />
                  </div>
                </div>

                <div class="fg">
                  <label>Número</label>

                  <div class="input-icon2">
                    <input
                      id="c-num"
                      type="text"
                      placeholder="123"
                    />
                  </div>
                </div>

              </div>

              <!-- BAIRRO / CIDADE / CEP -->
              <div class="fr3">

                <div class="fg">
                  <label>Bairro</label>

                  <div class="input-icon2">
                    <input
                      id="c-bairro"
                      type="text"
                      placeholder="Centro"
                    />
                  </div>
                </div>

                <div class="fg">
                  <label>Cidade</label>

                  <div class="input-icon2">
                    <input
                      id="c-cidade"
                      type="text"
                      placeholder="São Paulo"
                    />
                  </div>
                </div>

                <div class="fg">
                  <label>CEP</label>

                  <div class="input-icon2">
                    <input
                      id="c-cep"
                      type="text"
                      placeholder="00000-000"
                    />
                  </div>
                </div>

              </div>

              <!-- COMPLEMENTO -->
              <div class="fg">
                <label>Complemento</label>

                <div class="input-icon2">
                  <input
                    id="c-comp"
                    type="text"
                    placeholder="Apto 12, Bloco B"
                  />
                </div>
              </div>

              <!-- EMAIL -->
              <div class="fg">
                <label>E-mail *</label>

                <div class="input-icon2">
                  <input
                    id="l-email"
                    type="email"
                    placeholder="E-mail"
                  />
                </div>
              </div>

              <!-- SENHA -->
              <div class="fg">
                <label>Senha *</label>

                <div
                  class="input-icon2"
                  style="position: relative; display: flex; align-items: center;"
                >

                  <!-- Adicionado padding-right para a senha não esconder sob o olho -->
                  <input
                    id="l-senha"
                    type="password"
                    placeholder="Senha"
                    style="padding-right: 40px; width: 100%;"
                  />

                  <!-- Adicionado z-index para garantir o clique por cima do input -->
                  <button
                    type="button"
                    id="btn-show-pass"
                    onclick="togglePassword()"
                    style="
                      position: absolute;
                      right: 10px;
                      top: 50%;
                      transform: translateY(-50%);
                      background: none;
                      border: none;
                      cursor: pointer;
                      font-size: 18px;
                      z-index: 999;
                    "
                  >
                    👁️
                  </button>

                </div>
              </div>

              <!-- BOTÃO -->
              <button
                class="btn btn-entrarLogin"
                id="btn-login"
                style="
                  width: 100%;
                  padding: 10px;
                  margin-top: 10px;
                "
                onclick="criarLogin()"
              >
                Novo Login
              </button>

            </div>

          </section>

        </div>

      </div>
    </div>

    <!-- REDES -->
    <div class="redes-sociais">

      <a href="https://www.facebook.com/" target="_blank">
        <img
          src="./images/redes-sociais/facebook.svg"
          alt="Facebook"
        />
      </a>

      <a href="https://www.whatsapp.com/" target="_blank">
        <img
          src="./images/redes-sociais/whatsapp.svg"
          alt="WhatsApp"
        />
      </a>

      <a href="https://www.instagram.com/" target="_blank">
        <img
          src="./images/redes-sociais/instagram.svg"
          alt="Instagram"
        />
      </a>

      <a href="https://x.com/?lang=pt" target="_blank">
        <img
          src="./images/redes-sociais/twitter.svg"
          alt="Twitter"
        />
      </a>

    </div>

    <!-- Script externo do seu projeto -->
    <script src="script.js"></script>

    <!-- Função de alternar senha baseada nos IDs do seu HTML -->
    <script>
      function togglePassword() {
        const inputSenha = document.getElementById('l-senha');
        const botaoOlho = document.getElementById('btn-show-pass');
        
        if (inputSenha) {
          if (inputSenha.type === 'password') {
            inputSenha.type = 'text';
            botaoOlho.textContent = '🙈';
          } else {
            inputSenha.type = 'password';
            botaoOlho.textContent = '👁️';
          }
        }
      }
    </script>

  </body>
</html>
