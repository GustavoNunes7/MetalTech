<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetalTech - Login</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- ================= LOGIN ================= -->
    <div id="tela-login">
      <div class="login-box">
        <!-- LADO ESQUERDO -->
        <div class="new-login">
          <!-- LOGO -->
          <div class="login-logo">
            <img
              src="./images/Logo MetalTech 4.svg"
              alt="Metal Tech"
              width="275px"
            />
          </div>

          <!-- TEXTO -->
          <div class="text-novoLogin">
            <h2
              id="TextNovoID"
              style="text-decoration: underline; display: inline; color: black"
            >
              Fazer
            </h2>

            <h2 id="TextLoginID" style="display: inline; color: black">
              Login
            </h2>
          </div>

          <!-- FRASE -->
          <p
            style="
              margin-top: 15px;
              color: #444;
              font-size: 15px;
              text-align: center;
              line-height: 22px;
            "
          >
            A tecnologia move o futuro, mas é a inovação que transforma o
            presente.
          </p>

          <!-- BOTÃO VOLTAR -->
          <a href="index.html">
            <button
              class="btn btn-newLogin"
              id="btn-Criarlogin"
              style="
                padding: 10px;
                margin-top: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
              "
            >
              ← Voltar para tela inicial
            </button>
          </a>
        </div>

        <!-- ================= FORM LOGIN ================= -->

        <div class="login">
          <section id="pg-login">
            <!-- TÍTULO -->
            <div class="login-logo">
              <h1 id="idLogin-logo">CRIAR CONTA</h1>
            </div>

            <!-- ERRO -->
            <div class="login-erro" id="login-erro" style="display: none"></div>

            <!-- INPUTS -->
            <div class="loginIpt-btn">
              <!-- NOME -->
              <div class="fg">
                <div class="input-icon2">
                  <input id="l-name" type="text" placeholder="Nome Completo" />
                </div>
              </div>

              <!-- TELEFONE -->
              <div class="fg">
                <div class="input-icon2">
                  <!-- Adicionado o maxlength para limitar o tamanho do celular com máscara -->
                  <input
                    id="l-telefone"
                    type="text"
                    placeholder="Telefone"
                    maxlength="15"
                  />
                </div>
              </div>

                            <script>
                                // Captura o input pelo ID que você já estava usando
                                const inputTelefone = document.getElementById("l-telefone");

                                inputTelefone.addEventListener("input", (e) => {
                                let valor = e.target.value;

                                // Remove qualquer caractere que não seja número
                                valor = valor.replace(/\D/g, "");

                                // Formata o DDD com parênteses: (XX)
                                if (valor.length > 2) {
                                    valor = `(${valor.substring(0, 2)}) ${valor.substring(2)}`;
                                } else if (valor.length > 0) {
                                    valor = `(${valor}`;
                                }

                                // Formata o hífen do número do celular: (XX) XXXXX-XXXX
                                if (valor.length > 10) {
                                    valor = `${valor.substring(0, 10)}-${valor.substring(10, 14)}`;
                                }

                                // Atualiza o valor do input em tempo real
                                e.target.value = valor;
                                });
                            </script>

                            

              <!-- EMAIL -->
              <div class="fg">
                <div class="input-icon2">
                  <input
                    id="l-email"
                    type="email"
                    placeholder="E-mail"
                    onkeydown="if (event.key === 'Enter') fazerLogin();"
                  />
                </div>
              </div>

              <!-- ENDEREÇO -->
              <div class="fg">
                <div class="input-icon2">
                  <input id="l-endereço" type="text" placeholder="Endereço" />
                </div>
              </div>

              <!-- SENHA -->
              <div class="fg">
                <div class="input-icon2" style="position: relative">
                  <input
                    id="l-senha"
                    type="password"
                    placeholder="Senha"
                    onkeydown="if (event.key === 'Enter') fazerLogin();"
                  />

                  <!-- OLHO -->
                  <button
                    type="button"
                    id="btn-show-pass"
                    onclick="togglePassword()"
                    style="
                      position: absolute;
                      right: 10px;
                      top: 50%;
                      transform: translateY(-50%);
                      background: none;
                      border: none;
                      cursor: pointer;
                      font-size: 18px;
                    "
                  >
                    👁️
                  </button>
                </div>
              </div>

              <!-- BOTÃO ENTRAR -->
              <button
                class="btn btn-entrarLogin"
                id="btn-login"
                style="width: 100%; padding: 10px; margin-top: 10px"
                onclick="criarLogin()"
              >
                Novo Login
              </button>
            </div>
          </section>
        </div>
      </div>
    </div>

    <!-- ================= REDES SOCIAIS ================= -->

    <div class="redes-sociais">
      <a href="https://www.facebook.com/" target="_blank">
        <img src="./images/redes-sociais/facebook.svg" alt="Facebook" />
      </a>

      <a href="https://www.whatsapp.com/" target="_blank">
        <img src="./images/redes-sociais/whatsapp.svg" alt="WhatsApp" />
      </a>

      <a href="https://www.instagram.com/" target="_blank">
        <img src="./images/redes-sociais/instagram.svg" alt="Instagram" />
      </a>

      <a href="https://x.com/?lang=pt" target="_blank">
        <img src="./images/redes-sociais/twitter.svg" alt="Twitter" />
      </a>
    </div>

    <!-- SCRIPT -->
    <script src="script.js"></script>
  </body>
</html>
