<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCent</title>
    <link rel="stylesheet" href="./src/styles/styles.css">
    <link rel="Icon" href="./src/assets/image/Logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
</head>
<body>
    <!------------------- HEADER---------------------->

    <header class="main-header">
    <div class="logo-header">
        <div class="search-container">
            <input type="text" placeholder="Buscar na MetalTech" class="search-input" />
            <button class="search-btn">
                <i class="fas fa-search"></i> </button>
        </div>
    </div>
     
    <nav class="navbar-menu">
        <a href="#" class="menu-item">
            <img src="./src/assets/image/bolsa-de-compras 1.svg" alt="Produtos" class="menu-icon" />
            <span class="menu-text">Produtos</span>
        </a>

        <a href="#" class="menu-item">
            <img src="./src/assets/image/price-tag 1.svg" alt="Ofertas" class="menu-icon" />
            <span class="menu-text">Ofertas</span>
        </a>

        <a href="#" class="menu-item">
            <img src="./src/assets/image/telefone 1.svg" alt="Contato" class="menu-icon" />
            <span class="menu-text">Contato</span>
        </a>

        <a href="/public/criarConta.html" class="menu-item">
            <img src="./src/assets/image/do-utilizador 1.svg" alt="Conta" class="menu-icon user-icon" />
            <span class="menu-text">Conta</span>
        </a>
    </nav>
</header>

    <!------------------- FIM HEADER---------------------->

    <!------------------- MAIN ---------------------->

    <main>
        <div class="content-hero">
            <h1>TRASFORMANDO A FORÇA BRUTA DO METAL NA BASE <span>SÓLIDA DO SEU SUCESSO !</span></h1>
            <button class="btn-primary"><a href="/public/index.html">Fazer pedido</a></button>
        </div>

        <div>
            <img src="./src/assets/image/Group 4627.png" alt="Desenho ilustrativo de uma pessoa usando um computador"  >
        </div>
    </main>


    <!------------------- FIM MAIN ---------------------->

    <!------------------- PRODUTOS ---------------------->
    
    <section class="products-section">
        <div class="products-container">
            <!-- Produto 1 -->
            <div class="product-card">
                <div class="product-image-wrapper">
                    <img src="./src/assets/image/porca-sextavada.svg" alt="Porca Sextavada">
                </div>
                <h3 class="product-title">Porca Sextavada</h3>
            </div>

            <!-- Produto 2 -->
            <div class="product-card">
                <div class="product-image-wrapper">
                    <img src="./src/assets/image/chapa-aluminio.svg" alt="Chapa de Alumínio">
                </div>
                <h3 class="product-title">Chapa de Alumínio</h3>
            </div>

            <!-- Produto 3 -->
            <div class="product-card">
                <div class="product-image-wrapper">
                    <img src="./src/assets/image/aco-inox.svg" alt="Aço Inox">
                </div>
                <h3 class="product-title">Aço Inox</h3>
            </div>
        </div>
    </section>

    <!------------------- FIM PRODUTOS ---------------------->
    

    <!------------------ PELLENTESQUE ---------------------->
    <section class="pellentesque">
        <h2>Avaliação dos nossos clientes</h2>

        <a href="" class="btn-primary">
            <img src="./src/assets/image/Comentários.svg" alt="Comentário" loading="lazy">
            <img src="./src/assets/image/Comentários-1.svg" alt="Comentário 1" loading="lazy">
            <img src="./src/assets/image/Comentários-2.svg" alt="Comentário 2" loading="lazy">
        </a>
    </section>
    <!------------------- FIM PELLENTESQUE---------------------->

    <!------------------- RODAPÉ---------------------->
    <footer>
        <div class="copyright-container">
            <div class="logo-footer">
                <img src="./src/assets/image/Logo MetalTech 3.svg" alt="Logo Metal Tech" loading="lazy">
            </div>

            <div class="copyright-reserved">
                <p>Copyright © 2026 MetalTech.</p>
                <p>All rights reserved</p>
            </div>

            <div class="footer-socials">
                <div class="social-icon">
                    <a href="#"><img src="./src/assets/image/icons8-instagram-240 2.svg" alt="Instagram"></a>
                
                    <a href="#"><img src="./src/assets/image/icons8-facebook-num-círculo-240 2.svg" alt="Facebook"></a>
                
                    <a href="#"><img src="./src/assets/image/icons8-twitter-dentro-de-um-círculo-240 17.svg" alt="Twitter"></a>
                
                    <a href="#"><img src="./src/assets/image/icons8-whatsapp-240 27.svg" alt="Whatsapp"></a>
                    </div>
            </div>
        </div>

        <div class="footer-navigation">
            <div class="foot-conteiner">
                <h2>Contato</h2><br>
                <nav>
                    <ul class="footer-links">
                        <li><a href="#" class="footer-item">(99) 91234-5678</a><li>
                        <li><a href="#" class="footer-item">metalTech</a><li>
                     </ul>
                </nav>
            </div>
        
            <div class="foot-conteiner">
                <h2>Desenvolvedores</h2><br>
                 <a href="gustavonunes7"><img src="./src/assets/image/icons8-twitter-dentro-de-um-círculo-240 19.svg" alt="Stay up to date"></a>
                
                    
    <!------------------- FIM RODAPÉ---------------------->

</html>
